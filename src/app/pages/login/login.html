<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-2xl">
    <div class="text-center">
      <h2 class="text-4xl font-black text-gray-900 tracking-tight">Paulo Motor's</h2>
      <p class="mt-3 text-gray-500 text-sm font-medium">Gestão de Veículos</p>
    </div>
    
    <form class="mt-8 space-y-6" (submit)="onSubmit()">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 ml-1">Usuário</label>
          <input [(ngModel)]="loginData.login" name="login" type="text" required 
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all" 
            placeholder="Seu login">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 ml-1">Senha</label>
          <input [(ngModel)]="loginData.password" name="password" type="password" required 
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all" 
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" 
        class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
        Entrar no Sistema
      </button>
    </form>
  </div>
</div>
