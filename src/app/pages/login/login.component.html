<div class="login-page bg-light d-flex align-items-center justify-content-center">
  <div class="max-w-md w-full bg-white p-8 rounded-4 shadow-lg border-0">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-gray-800">Login</h2>
      <p class="text-muted">Acesse sua conta para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">E-mail</label>
        <input type="email" name="email" [(ngModel)]="email" required
               class="w-full px-4 py-3 border rounded-pill focus:outline-none focus:ring-2 focus:ring-primary border-gray-300">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">Senha</label>
        <input type="password" name="password" [(ngModel)]="password" required
               class="w-full px-4 py-3 border rounded-pill focus:outline-none focus:ring-2 focus:ring-primary border-gray-300">
      </div>
      
      <button type="submit" 
              class="w-full bg-primary text-white py-3 rounded-pill font-bold hover:opacity-90 transition duration-200 shadow-md">
        Entrar
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-600">Ainda não tem uma conta?</p>
      <button (click)="showRegisterModal = true" class="text-primary font-bold hover:underline bg-transparent border-0 p-0">
        Cadastre-se agora
      </button>
    </div>

    <p *ngIf="message" class="mt-4 text-red-500 text-center text-sm font-semibold bg-red-50 p-2 rounded-3">
      {{ message }}
    </p>
  </div>
</div>

<div *ngIf="showRegisterModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50">
  <div class="bg-white w-full max-w-md rounded-4 shadow-2xl p-6 relative">
    <button (click)="showRegisterModal = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 border-0 bg-transparent">
      <i class="bi bi-x-lg fs-5"></i>
    </button>
    
    <h3 class="text-2xl font-bold mb-2">Criar conta</h3>
    <p class="text-muted mb-6 small">Preencha os dados abaixo para alugar seu carro.</p>

    <form (ngSubmit)="onRegister()">
      <div class="mb-3">
        <input type="text" name="regNome" [(ngModel)]="registerData.nome" placeholder="Nome Completo" required
               class="w-full px-4 py-2 border border-gray-300 rounded-pill focus:ring-2 focus:ring-primary outline-none">
      </div>
      <div class="mb-3">
        <input type="email" name="regLogin" [(ngModel)]="registerData.login" placeholder="E-mail" required
               class="w-full px-4 py-2 border border-gray-300 rounded-pill focus:ring-2 focus:ring-primary outline-none">
      </div>
      <div class="mb-4">
        <input type="password" name="regPass" [(ngModel)]="registerData.password" placeholder="Senha" required
               class="w-full px-4 py-2 border border-gray-300 rounded-pill focus:ring-2 focus:ring-primary outline-none">
      </div>
      <button type="submit" class="w-full bg-primary text-white py-2 rounded-pill font-bold hover:opacity-90 shadow">
        Finalizar Cadastro
      </button>
    </form>
  </div>
</div>
