<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center text-dark fs-3" routerLink="/home">
      <i class="bi bi-car-front-fill me-2 text-dark"></i> PAULO MOTOR'S
    </a>
  </div>
</nav>

<div class="login-page">
  <div class="card p-4 m-3 w-100" style="max-width: 420px;">
    <div class="card-body text-center p-3">
      <h2 class="card-title mb-2">Login</h2>
      <p class="text-muted small mb-4">Acesse sua conta para continuar</p>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4 text-start">
          <label class="form-label fw-semibold text-muted small">E-mail</label>
          <input type="email" name="email" [(ngModel)]="email" required class="form-control rounded-pill px-4 py-3">
        </div>
        <div class="mb-4 text-start">
          <label class="form-label fw-semibold text-muted small">Senha</label>
          <input type="password" name="password" [(ngModel)]="password" required class="form-control rounded-pill px-4 py-3">
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 text-white fw-bold shadow-md">
          Entrar
        </button>
      </form>

      <div class="mt-4">
        <p class="text-muted small mb-0">Ainda não tem uma conta?</p>
        <button (click)="showRegisterModal = true" class="text-primary font-bold bg-transparent border-0 p-0 mt-1 fs-5">
          Cadastre-se agora
        </button>
      </div>

      <p *ngIf="message" class="mt-4 text-danger text-center text-sm font-semibold p-2 bg-light rounded-3">
        {{ message }}
      </p>
    </div>
  </div>
</div>

<div *ngIf="showRegisterModal" class="modal-backdrop fade show"></div>
<div *ngIf="showRegisterModal" class="modal d-block tab-modal" tabindex="-1" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered p-3">
    <div class="modal-content p-4 border-0 rounded-4 shadow-2xl position-relative" style="background-color: #fcf9f2;">
      <button (click)="showRegisterModal = false" class="position-absolute top-0 end-0 m-3 text-gray-400 hover:text-gray-600 border-0 bg-transparent">
        <i class="bi bi-x-lg fs-5"></i>
      </button>
      
      <h3 class="card-title text-start mb-2" style="font-size: 1.75rem;">Criar conta</h3>
      <p class="text-muted mb-4 text-start small">Preencha os dados abaixo para alugar seu carro.</p>

      <form (ngSubmit)="onRegister()">
        <div class="mb-3">
          <input type="text" name="regNome" [(ngModel)]="registerData.nome" placeholder="Nome Completo" required class="form-control rounded-pill px-4 py-2">
        </div>
        <div class="mb-3">
          <input type="email" name="regLogin" [(ngModel)]="registerData.login" placeholder="E-mail" required class="form-control rounded-pill px-4 py-2">
        </div>
        <div class="mb-4">
          <input type="password" name="regPass" [(ngModel)]="registerData.password" placeholder="Senha" required class="form-control rounded-pill px-4 py-2">
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill font-bold text-white shadow">
          Finalizar Cadastro
        </button>
      </form>
    </div>
  </div>
</div>
